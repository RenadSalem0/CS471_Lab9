<!DOCTYPE html>
<html>
<head>
    <title>Books</title>
</head>
<body>

<h1>Books List</h1>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Edition</th>
    </tr>

    {% for book in books %}
    <tr>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.price }}</td>
        <td>{{ book.edition }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
